global
    log stdout format raw local0

defaults
    log global
    mode tcp
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

# clients connecting here are proxied to an acceptor with proxyEnabled=true which should succeed
frontend valid-1
    bind *:51617
    default_backend valid-1

backend valid-1
    server broker broker:61617 send-proxy

# clients connecting here are proxied to an acceptor with proxyEnabled=true which should succeed
frontend valid-2
    bind *:51618
    default_backend valid-2

backend valid-2
    server broker broker:61617 send-proxy-v2

# clients connecting here are proxied to an acceptor with proxyEnabled=false which should fail
frontend invalid
    bind *:51616
    default_backend invalid

backend invalid
    server broker broker:61616 send-proxy
